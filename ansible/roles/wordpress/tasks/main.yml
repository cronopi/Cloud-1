# WordPress - Despliegue de WordPress y phpMyAdmin
# Levanta los contenedores de WordPress (php-fpm) y phpMyAdmin

- name: Detectar docker compose disponible
  command: docker compose version
  register: compose_plugin
  changed_when: false
  failed_when: false

- name: Verificar si WordPress ya está corriendo
  command: docker ps -q --filter name=^wordpress$ --filter status=running
  register: wp_running
  changed_when: false

- name: Verificar si phpMyAdmin ya está corriendo
  command: docker ps -q --filter name=^phpmyadmin$ --filter status=running
  register: pma_running
  changed_when: false

- name: Levantar contenedor WordPress (compose plugin)
  shell: |
    cd {{ remote_project_dir }}
    docker compose up -d wordpress
  when: wp_running.stdout == "" and compose_plugin.rc == 0

- name: Levantar contenedor WordPress (compose standalone)
  shell: |
    cd {{ remote_project_dir }}
    docker-compose up -d wordpress
  when: wp_running.stdout == "" and compose_plugin.rc != 0

- name: Levantar contenedor phpMyAdmin (compose plugin)
  shell: |
    cd {{ remote_project_dir }}
    docker compose up -d phpmyadmin
  when: pma_running.stdout == "" and compose_plugin.rc == 0

- name: Levantar contenedor phpMyAdmin (compose standalone)
  shell: |
    cd {{ remote_project_dir }}
    docker-compose up -d phpmyadmin
  when: pma_running.stdout == "" and compose_plugin.rc != 0

- name: Verificar estado de WordPress
  command: docker ps --filter name=wordpress --format "{{ '{{' }}.Status{{ '}}' }}"
  register: wp_status
  changed_when: false

- name: Verificar estado de phpMyAdmin
  command: docker ps --filter name=phpmyadmin --format "{{ '{{' }}.Status{{ '}}' }}"
  register: pma_status
  changed_when: false

- name: Mostrar estado de servicios WordPress
  debug:
    msg:
      - "WordPress: {{ wp_status.stdout }}"
      - "phpMyAdmin: {{ pma_status.stdout }}"

