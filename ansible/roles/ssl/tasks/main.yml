---
# SSL/TLS - Generación de certificados autofirmados para HTTPS

- name: Crear directorio para certificados SSL
  file:
    path: "{{ remote_project_dir }}/nginx/ssl"
    state: directory
    mode: '0700'

- name: Verificar si certificado ya existe
  stat:
    path: "{{ remote_project_dir }}/nginx/ssl/cert.pem"
  register: cert_file

- name: Generar certificado autofirmado (365 días)
  shell: |
    openssl req -x509 -newkey rsa:2048 \
      -keyout {{ remote_project_dir }}/nginx/ssl/key.pem \
      -out {{ remote_project_dir }}/nginx/ssl/cert.pem \
      -days 365 \
      -nodes \
      -subj "/C=ES/ST=Madrid/L=Madrid/O=42/OU=Cloud-1/CN={{ domain | default('localhost') }}"
  when: not cert_file.stat.exists

- name: Verificar openssl
  command: which openssl
  register: openssl_check
  changed_when: false
  failed_when: false

- name: Instalar openssl si es necesario
  apt:
    name: openssl
    state: present
  when: openssl_check.rc != 0

- name: Validar que los certificados existen
  stat:
    path: "{{ remote_project_dir }}/nginx/ssl/{{ item }}"
  register: cert_files
  with_items:
    - cert.pem
    - key.pem

- name: Fallar si los certificados no se generaron
  fail:
    msg: "ERROR: No se generaron los certificados SSL"
  when: cert_files.results | selectattr('stat.exists', 'equalto', false) | list | length > 0
