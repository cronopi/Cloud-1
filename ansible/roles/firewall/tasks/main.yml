# Firewall - Configuración de puertos seguros
# Requisito obligatorio Cloud-1: "Only ports 80 (HTTP), 443 (HTTPS), and 22 (SSH) must be accessible"

- name: Verificar si UFW está instalado
  command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

- name: Instalar UFW (Uncomplicated Firewall)
  apt:
    name: ufw
    state: present
  when: ufw_check.rc != 0

- name: Permitir SSH (puerto 22) ANTES de cualquier cambio
  ufw:
    rule: allow
    port: "22"
    proto: tcp
  # CRÍTICO: SSH primero para no perder conexión

- name: Permitir HTTP (puerto 80)
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Permitir HTTPS (puerto 443)
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Bloquear acceso a MySQL (puerto 3306)
  ufw:
    rule: deny
    port: "3306"
    proto: tcp

- name: Bloquear acceso a PHP-FPM (puerto 9000)
  ufw:
    rule: deny
    port: "9000"
    proto: tcp

- name: Establecer política por defecto DENY incoming
  ufw:
    policy: deny
    direction: incoming

- name: Establecer política por defecto ALLOW outgoing
  ufw:
    policy: allow
    direction: outgoing

- name: Establecer política por defecto ALLOW routed
  ufw:
    policy: allow
    direction: routed

- name: Habilitar UFW
  ufw:
    state: enabled

- name: Mostrar estado del firewall
  command: ufw status verbose
  register: ufw_status
  changed_when: false

- name: Mostrar reglas del firewall
  debug:
    msg: "{{ ufw_status.stdout_lines }}"
